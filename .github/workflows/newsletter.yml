name: Newsletter Novidades do Blog
# Agendamento gerenciado pelo cron-job.org (newsletter-novidades-do-blog)
# https://cron-job.org/en/members/jobs/
on:
  workflow_dispatch:
jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd novidades-do-blog && npm install
      - run: cd novidades-do-blog && node newsletter-novidades-do-blog.js
        env:
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
